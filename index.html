<!DOCTYPE html>
<html>
<head>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        model-viewer::part(interaction-prompt) { 
            display: none !important; 
        }
        model-viewer {
            --interaction-prompt-tap-message: none;
            --interaction-prompt-touch-message: none;
            --interaction-prompt-mouse-message: none;
        }
    </style>
</head>
<body>
    <model-viewer 
        id="viewer"
        src="model.glb" 
        ar 
        camera-controls 
        interaction-prompt="false"
        touch-action="pan-x pan-y pinch-zoom"
        style="width: 100%; height: 95vh;">
    </model-viewer>
    
    <script>
        const viewer = document.querySelector('#viewer');
        viewer.updateCompletionPromise();
    </script>
</body>
</html>
