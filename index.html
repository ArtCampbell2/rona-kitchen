<!DOCTYPE html>
<html>
<head>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        model-viewer::part(interaction-prompt) {
            display: none !important;
        }
    </style>
</head>
<body>
    <model-viewer 
        src="model.glb" 
        ar 
        camera-controls

    </model-viewer>
</body>
</html>
